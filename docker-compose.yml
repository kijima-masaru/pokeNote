services:
  nginx:
    image: nginx:1.21.1
    container_name: pokenote-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    depends_on:
      php:
        condition: service_healthy

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pokenote-php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-poke_note}"
      # ローカル開発の DB_USERNAME=root と衝突しないよう Docker 専用変数を使用
      DB_USERNAME: "${MYSQL_APP_USER:-pokenote}"
      DB_PASSWORD: "${MYSQL_APP_PASSWORD:-secret}"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  mysql:
    image: mysql:8.0.26
    container_name: pokenote-mysql
    restart: unless-stopped
    command: mysqld --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${DB_DATABASE:-poke_note}"
      MYSQL_USER: "${MYSQL_APP_USER:-pokenote}"
      MYSQL_PASSWORD: "${MYSQL_APP_PASSWORD:-secret}"
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pokenote-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: "${MYSQL_APP_USER:-pokenote}"
      PMA_PASSWORD: "${MYSQL_APP_PASSWORD:-secret}"
    ports:
      - "${PMA_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy
